name: CI/CD

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Setup ROS
        uses: ros-tooling/setup-ros@v0.3
        with:
          required-ros-distributions: noetic

      - name: Install packages
        run: sudo apt-get install python3-catkin-tools xorg-dev libjsoncpp-dev qtbase5-dev

      - name: Setup catkin workspace
        run: source /opt/ros/noetic/setup.bash && catkin init

      - name: Check out repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.CI_TOKEN }}
          path: src/image_matching
      
      - name: Check out bb_msgs
        uses: actions/checkout@v3
        with:
          repository: BumblebeeAS/bb_msgs
          token: ${{ secrets.CI_TOKEN }}
          path: src/bb_msgs

      - name: Install dependencies
        run: source /opt/ros/noetic/setup.bash && rosdep update && rosdep install --from-paths src -i -r -y

      - name: Build
        run: source /opt/ros/noetic/setup.bash && catkin build --no-status 
      
      - name: Run tests
        run: source devel/setup.bash && ./src/image_matching/tests/test_matcher_service.py
